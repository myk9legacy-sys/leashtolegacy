<!-- Script principal: menú hamburguesa + carga de videos desde site-data.json -->
<script>
  // Menú hamburguesa
  document.querySelector('.menu-toggle')?.addEventListener('click', function() {
    document.querySelector('.main-nav').classList.toggle('active');
  });

  // Función para renderizar videos
  function renderVideos(videos) {
    const container = document.getElementById('videos-grid');
    if (!container) return;

    container.innerHTML = '';

    if (!videos || videos.length === 0) {
      container.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; padding: 40px;">No videos added yet.</p>';
      return;
    }

    // Mostrar cada video
    videos.forEach(video => {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.dataset.categories = video.categories?.join(',') || '';

      card.innerHTML = `
        <video class="plyr-video" controls playsinline poster="${video.thumbnail || ''}">
          <source src="${video.url}" type="video/mp4">
          Your browser does not support video.
        </video>
        <h3>${video.title}</h3>
        <p>${video.description || ''}</p>
      `;

      container.appendChild(card);
    });

    // Inicializar Plyr en todos los videos
    document.querySelectorAll('.plyr-video').forEach(video => {
      new Plyr(video);
    });
  }

  // Cargar videos dinámicamente desde site-data.json
  document.addEventListener('DOMContentLoaded', () => {
    fetch('/site-data.json')
      .then(response => {
        if (!response.ok) throw new Error('Could not load site-data.json');
        return response.json();
      })
      .then(data => {
        let videos = data.training_videos || [];
        
        // Si no hay videos, intentar cargar desde localStorage
        if (videos.length === 0) {
          const backup = localStorage.getItem('training_videos_backup');
          if (backup) {
            try {
              videos = JSON.parse(backup);
              console.log('Videos cargados desde respaldo local');
            } catch (e) {
              console.warn('Error al cargar respaldo:', e);
            }
          }
        }
        
        renderVideos(videos);
      })
      .catch(error => {
        console.error('Error al cargar desde site-data.json:', error);
        
        // Intentar cargar desde localStorage como respaldo
        const backup = localStorage.getItem('training_videos_backup');
        if (backup) {
          try {
            const videos = JSON.parse(backup);
            console.log('Cargando videos desde respaldo local');
            renderVideos(videos);
          } catch (e) {
            console.error('Error al cargar respaldo:', e);
            document.getElementById('videos-grid').innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: red;">Error al cargar los videos. Intenta más tarde.</p>';
          }
        } else {
          document.getElementById('videos-grid').innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: red;">Error al cargar los videos. Intenta más tarde.</p>';
        }
      });
  });

  // Filtro básico (opcional - puedes mejorarlo después)
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filter = btn.dataset.filter;
      document.querySelectorAll('.video-card').forEach(card => {
        if (filter === 'all' || card.dataset.categories.includes(filter)) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    });
  });
</script>
