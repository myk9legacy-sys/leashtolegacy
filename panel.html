<!-- SECCIÓN BLOG - Reemplaza la sección BLOG en panel.html -->
<div class="section hidden" id="section-blog">
  <h2>Blog Editor</h2>
  
  <div class="sub-section">
    <h3>Add / Edit Blog Post</h3>
    <form id="blog-form">
      <div class="form-group">
        <label>Post Title</label>
        <input type="text" id="blog-title" placeholder="Enter post title" required>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="blog-date">
      </div>
      <div class="form-group">
        <label>Summary (optional - auto-generated if empty)</label>
        <textarea id="blog-summary" rows="2" placeholder="Brief summary of the post"></textarea>
      </div>
      <div class="form-group">
        <label>Content (use blank lines for paragraphs)</label>
        <textarea id="blog-content" rows="10" placeholder="Write your post content here..." required></textarea>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="blog-image-url" placeholder="https://ejemplo.com/imagen.jpg" value="">
      </div>
      <div class="preview">
        <img id="blog-preview-img" src="" alt="Preview" style="max-width: 200px; display: none;">
      </div>
      <button type="submit">Save Blog Post</button>
      <button type="button" id="cancel-blog-edit" style="background: #666; margin-left: 10px;">Cancel Edit</button>
    </form>
  </div>

  <div class="sub-section">
    <h3>Existing Posts</h3>
    <div id="blog-posts-list" class="blog-posts-list"></div>
  </div>
</div>
